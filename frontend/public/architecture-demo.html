<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafetyAgent Architecture — Interactive Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f8f9fc;
  color: #1f2937;
  overflow-x: hidden;
}

.header {
  text-align: center;
  padding: 32px 24px 16px;
  background: linear-gradient(135deg, #ffffff 0%, #f0e6ff 100%);
  border-bottom: 1px solid rgba(168, 85, 247, 0.2);
}

.header h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, #a855f7, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.header p {
  color: #6b7280;
  font-size: 14px;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 16px;
  background: rgba(255, 255, 255, 0.9);
  border-bottom: 1px solid rgba(168, 85, 247, 0.15);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.btn {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid rgba(168, 85, 247, 0.3);
  background: rgba(168, 85, 247, 0.06);
  color: #7c3aed;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.btn:hover { background: rgba(168, 85, 247, 0.15); transform: translateY(-1px); }
.btn.active { background: rgba(168, 85, 247, 0.2); border-color: #a855f7; }
.btn.play { background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.4); color: #059669; }
.btn.play:hover { background: rgba(16, 185, 129, 0.2); }
.btn.play.playing { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.4); color: #dc2626; }

.canvas-container {
  position: relative;
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 24px;
  min-height: 700px;
}

svg.diagram {
  width: 100%;
  height: 680px;
  overflow: visible;
}

.node {
  cursor: pointer;
  transition: transform 0.2s, filter 0.2s;
}

.node:hover { transform: scale(1.05); filter: drop-shadow(0 0 12px rgba(168, 85, 247, 0.5)); }

.node-box {
  rx: 10;
  ry: 10;
  stroke-width: 2;
  transition: stroke 0.3s, fill 0.3s;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.06));
}

.node-label {
  font-size: 11px;
  font-weight: 600;
  fill: #1f2937;
  text-anchor: middle;
  pointer-events: none;
}

.node-sublabel {
  font-size: 9px;
  fill: #6b7280;
  text-anchor: middle;
  pointer-events: none;
}

.node-icon {
  font-size: 18px;
  text-anchor: middle;
  pointer-events: none;
}

.edge {
  stroke-width: 2;
  fill: none;
  opacity: 0.4;
  transition: opacity 0.4s, stroke-width 0.3s;
}

.edge.active {
  opacity: 1;
  stroke-width: 3;
}

.data-particle {
  r: 4;
  opacity: 0;
}

.data-particle.moving {
  opacity: 1;
  transition: opacity 0.3s;
}

.phase-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  fill: rgba(124, 58, 237, 0.7);
}

.agent-badge {
  font-size: 8px;
  font-weight: 700;
  fill: #fbbf24;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.legend {
  position: absolute;
  bottom: 24px;
  left: 24px;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: #6b7280;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 3px;
}

.info-panel {
  position: fixed;
  top: 50%;
  right: 24px;
  transform: translateY(-50%);
  width: 340px;
  background: rgba(255, 255, 255, 0.97);
  border: 1px solid rgba(168, 85, 247, 0.2);
  border-radius: 12px;
  padding: 24px;
  backdrop-filter: blur(12px);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 50;
}

.info-panel.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(-50%) translateX(0);
}

.info-panel h3 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
  color: #7c3aed;
}

.info-panel .service-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(124, 58, 237, 0.08);
  border: 1px solid rgba(124, 58, 237, 0.3);
  color: #7c3aed;
  margin-bottom: 12px;
}

.info-panel .agent-tag {
  background: rgba(217, 119, 6, 0.08);
  border-color: rgba(217, 119, 6, 0.3);
  color: #b45309;
  margin-left: 6px;
}

.info-panel p {
  font-size: 13px;
  line-height: 1.6;
  color: #374151;
  margin-bottom: 12px;
}

.info-panel .why {
  font-size: 12px;
  color: #6b7280;
  border-left: 3px solid rgba(124, 58, 237, 0.3);
  padding-left: 12px;
  margin-top: 12px;
}

.info-panel .close-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 24px;
  height: 24px;
  border: none;
  background: rgba(0,0,0,0.05);
  color: #6b7280;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  line-height: 24px;
  text-align: center;
}

.narration-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(255, 255, 255, 0.95);
  border-top: 1px solid rgba(168, 85, 247, 0.15);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  backdrop-filter: blur(12px);
  box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
  z-index: 100;
  transform: translateY(100%);
  transition: transform 0.3s;
}

.narration-bar.visible { transform: translateY(0); }

.narration-text {
  flex: 1;
  font-size: 13px;
  color: #374151;
  line-height: 1.5;
}

.narration-step {
  font-size: 11px;
  color: #9ca3af;
  white-space: nowrap;
}

.progress-dots {
  display: flex;
  gap: 4px;
}

.progress-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(168, 85, 247, 0.2);
  transition: background 0.3s;
}

.progress-dot.active { background: #7c3aed; }
.progress-dot.done { background: #059669; }

@keyframes glowPulse {
  0%, 100% { filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.6)) drop-shadow(0 0 20px rgba(251, 191, 36, 0.3)); transform: scale(1.05); }
  50% { filter: drop-shadow(0 0 16px rgba(251, 191, 36, 0.9)) drop-shadow(0 0 40px rgba(251, 191, 36, 0.5)); transform: scale(1.08); }
}

.node.highlighted {
  animation: glowPulse 1.8s ease-in-out infinite;
  z-index: 10;
}

.node.highlighted .node-box {
  stroke: #fbbf24 !important;
  stroke-width: 3 !important;
  fill: rgba(251, 191, 36, 0.12) !important;
}

.node.dimmed {
  opacity: 0.2;
  transition: opacity 0.4s;
}

@keyframes flowDash {
  to { stroke-dashoffset: -20; }
}
.edge.flowing {
  stroke-dasharray: 8 4;
  animation: flowDash 1s linear infinite;
  opacity: 0.8;
}

@media (max-width: 900px) {
  .info-panel { position: fixed; top: auto; bottom: 80px; right: 12px; left: 12px; width: auto; transform: none; }
  .info-panel.visible { transform: none; }
}
</style>
</head>
<body>
<script src="/narration/bgm-engine.js"></script>

<div class="header">
  <h1>SafetyAgent Architecture</h1>
  <p>Autonomous Trust & Safety System for the app — millions of users with high autonomous resolution rates</p>
</div>

<div class="controls">
  <button class="btn play" id="playBtn" onclick="toggleNarration()">&#9654; Play Narration</button>
  <button class="btn" id="bgmBtn" onclick="toggleBGMVolume()" title="Background music volume">&#9835; BGM: Med</button>
  <button class="btn" onclick="highlightPhase('detection')">Detection</button>
  <button class="btn" onclick="highlightPhase('investigation')">Investigation</button>
  <button class="btn" onclick="highlightPhase('decision')">Decision</button>
  <button class="btn" onclick="highlightPhase('enforcement')">Enforcement</button>
  <button class="btn" onclick="highlightPhase('all')">Show All</button>
</div>

<div class="canvas-container">
  <svg class="diagram" viewBox="0 0 1200 680">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="rgba(168,85,247,0.6)"/>
      </marker>
      <marker id="arrowhead-active" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#a855f7"/>
      </marker>
      <linearGradient id="agentGlow" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.3"/>
        <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.1"/>
      </linearGradient>
    </defs>

    <!-- Phase labels -->
    <text class="phase-label" x="120" y="30">Detection</text>
    <text class="phase-label" x="420" y="30">Investigation</text>
    <text class="phase-label" x="760" y="30">Decision</text>
    <text class="phase-label" x="1040" y="30">Enforcement</text>

    <!-- Phase separator lines -->
    <line x1="320" y1="40" x2="320" y2="660" stroke="rgba(168,85,247,0.15)" stroke-dasharray="4 4"/>
    <line x1="660" y1="40" x2="660" y2="660" stroke="rgba(168,85,247,0.15)" stroke-dasharray="4 4"/>
    <line x1="940" y1="40" x2="940" y2="660" stroke="rgba(168,85,247,0.15)" stroke-dasharray="4 4"/>

    <!-- ===== DETECTION PHASE ===== -->

    <!-- Kinesis Stream -->
    <g class="node" data-id="kinesis" data-phase="detection" onclick="showInfo('kinesis')">
      <rect class="node-box" x="40" y="80" width="140" height="60" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.5)"/>
      <text class="node-icon" x="110" y="105">&#x1F4E1;</text>
      <text class="node-label" x="110" y="125">Kinesis Data Stream</text>
      <text class="node-sublabel" x="110" y="137">behavioral-events</text>
    </g>

    <!-- Behavioral Processor -->
    <g class="node" data-id="behavioral-processor" data-phase="detection" onclick="showInfo('behavioral-processor')">
      <rect class="node-box" x="40" y="180" width="140" height="60" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.5)"/>
      <text class="node-icon" x="110" y="205">&#x1F916;</text>
      <text class="node-label" x="110" y="223">Behavioral Processor</text>
      <text class="agent-badge" x="110" y="235">AGENT</text>
    </g>

    <!-- EventBridge -->
    <g class="node" data-id="eventbridge" data-phase="detection" onclick="showInfo('eventbridge')">
      <rect class="node-box" x="40" y="290" width="140" height="60" fill="rgba(236,72,153,0.1)" stroke="rgba(236,72,153,0.5)"/>
      <text class="node-icon" x="110" y="315">&#x26A1;</text>
      <text class="node-label" x="110" y="335">EventBridge</text>
      <text class="node-sublabel" x="110" y="347">Profile Events</text>

    <!-- Profile Processor -->
    <g class="node" data-id="profile-processor" data-phase="detection" onclick="showInfo('profile-processor')">

      <text class="node-label" x="110" y="433">Profile Processor</text>
      <text class="agent-badge" x="110" y="445">AGENT</text>

    <!-- Anomaly Detection (SageMaker) -->
    <g class="node" data-id="sagemaker" data-phase="detection" onclick="showInfo('sagemaker')">

      <text class="node-label" x="290" y="433">Partner Network Intel</text>
      <text class="node-sublabel" x="290" y="445">mTLS Blocklist</text>

    <!-- ===== INVESTIGATION PHASE ===== -->

    <!-- Step Functions -->
    <g class="node" data-id="stepfunctions" data-phase="investigation" onclick="showInfo('stepfunctions')">
      <rect class="node-box" x="400" y="120" width="160" height="70" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.5)"/>
      <text class="node-icon" x="480" y="148">&#x2699;&#xFE0F;</text>
      <text class="node-label" x="480" y="168">Step Functions</text>
      <text class="node-sublabel" x="480" y="180">Investigation Workflow</text>
      <text class="agent-badge" x="480" y="185">ORCHESTRATOR</text>

    <!-- Evidence Assembler -->

      <text class="node-label" x="445" y="280">Evidence Assembler</text>
      <text class="agent-badge" x="445" y="292">AGENT</text>

    <!-- Content Analysis (Bedrock) -->

      <text class="node-icon" x="605" y="262">&#x1F916;</text>
      <text class="node-label" x="605" y="280">Bedrock (Claude)</text>
      <text class="agent-badge" x="605" y="292">AI AGENT</text>
    </g>

    <!-- Confidence Calculator -->
    <g class="node" data-id="confidence" data-phase="investigation" onclick="showInfo('confidence')">
      <rect class="node-box" x="420" y="340" width="150" height="55" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.5)"/>
      <text class="node-icon" x="495" y="362">&#x1F4CA;</text>
      <text class="node-label" x="495" y="380">Confidence Calculator</text>
      <text class="agent-badge" x="495" y="392">AGENT</text>
    </g>

    <!-- DynamoDB -->
    <g class="node" data-id="dynamodb" data-phase="investigation" onclick="showInfo('dynamodb')">
      <rect class="node-box" x="420" y="450" width="150" height="55" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.5)"/>
      <text class="node-icon" x="495" y="472">&#x1F4BE;</text>
      <text class="node-label" x="495" y="490">DynamoDB</text>
      <text class="node-sublabel" x="495" y="502">10 Tables (tg-*)</text>
    </g>

    <!-- S3 -->
    <g class="node" data-id="s3" data-phase="investigation" onclick="showInfo('s3')">
      <rect class="node-box" x="420" y="540" width="150" height="55" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.5)"/>
      <text class="node-icon" x="495" y="562">&#x1F4E6;</text>
      <text class="node-label" x="495" y="580">S3</text>
      <text class="node-sublabel" x="495" y="592">Evidence + Audit</text>
    </g>

    <!-- Redis -->
    <g class="node" data-id="redis" data-phase="investigation" onclick="showInfo('redis')">

    <!-- Crisis Response -->

      <text class="node-label" x="795" y="480">Wellbeing Monitor</text>
      <text class="node-sublabel" x="795" y="492">Reviewer Exposure</text>

    <!-- ===== ENFORCEMENT PHASE ===== -->

    <!-- Audit Trail -->

      <text class="node-label" x="1050" y="580">WebSocket API GW</text>
      <text class="node-sublabel" x="1050" y="592">Real-time Dashboard</text>
    </g>

let isPlaying = false;
let currentStep = 0;
let narrationTimeout = null;
let audioElement = null;
let bgm = new BGMEngine();

// ===== POLLY PRE-GENERATED AUDIO =====
async function speakText(text) {
  return new Promise((resolve) => {
    const stepIndex = currentStep.toString().padStart(2, '0');
    const audioSrc = `/narration/step-${stepIndex}.mp3`;

    if (audioElement) {
      audioElement.pause();
      audioElement.currentTime = 0;
    }

    audioElement = new Audio(audioSrc);
    audioElement.onended = resolve;
    audioElement.onerror = () => {
      console.warn('Audio file not found, advancing after timeout');
      setTimeout(resolve, narrationSteps[currentStep]?.duration || 5000);
    };
    audioElement.play().catch(() => {
      setTimeout(resolve, narrationSteps[currentStep]?.duration || 5000);
    });
  });
}

// ===== NARRATION CONTROL =====
function toggleNarration() {
  if (isPlaying) {
    stopNarration();
  } else {
    startNarration();
  }
}

function startNarration() {
  isPlaying = true;
  currentStep = 0;
  const btn = document.getElementById('playBtn');
  btn.textContent = '⏹ Stop';
  btn.classList.add('playing');
  document.getElementById('narrationBar').classList.add('visible');
  renderProgressDots();

  // Start background music
  bgm.start();

  playStep();
}

function stopNarration() {
  isPlaying = false;
  const btn = document.getElementById('playBtn');
  btn.textContent = '▶ Play Narration';
  btn.classList.remove('playing');
  document.getElementById('narrationBar').classList.remove('visible');
  if (narrationTimeout) clearTimeout(narrationTimeout);
  if (audioElement) audioElement.pause();

  // Fade out background music
  bgm.fadeOut(1.5);

  resetHighlights();
}

async function playStep() {
  if (!isPlaying || currentStep >= narrationSteps.length) {
    if (isPlaying) stopNarration();
    return;
  }

  const step = narrationSteps[currentStep];
  document.getElementById('narrationText').textContent = step.text;
  document.getElementById('narrationStep').textContent = `${currentStep + 1} / ${narrationSteps.length}`;
  updateProgressDots();

  // Highlight nodes — glow active ones, dim everything else
  resetHighlights();
  if (step.highlight.length > 0) {
    document.querySelectorAll('.node').forEach(n => {
      n.classList.add('dimmed');
    });
    step.highlight.forEach(id => {
      const node = document.querySelector(`[data-id="${id}"]`);
      if (node) {
        node.classList.remove('dimmed');
        node.classList.add('highlighted');
      }
    });
  }

  // Activate edges for phase
  highlightPhaseEdges(step.phase);

  // Speak
  await speakText(step.text);

  // Small pause between steps
  if (isPlaying) {
    narrationTimeout = setTimeout(() => {
      currentStep++;
      playStep();
    }, 800);
  }
}

function renderProgressDots() {
  const container = document.getElementById('progressDots');
  container.innerHTML = narrationSteps.map((_, i) => `<div class="progress-dot" data-step="${i}"></div>`).join('');
}

function updateProgressDots() {
  document.querySelectorAll('.progress-dot').forEach((dot, i) => {
    dot.classList.remove('active', 'done');
    if (i === currentStep) dot.classList.add('active');
    else if (i < currentStep) dot.classList.add('done');
  });
}

// ===== INTERACTION =====

  const info = nodeInfo[nodeId];
  if (!info) return;

  document.getElementById('infoTitle').textContent = info.title;
  let tags = `<span class="service-tag">${info.service}</span>`;
  if (info.agent) tags += `<span class="service-tag agent-tag">AI Agent</span>`;
  document.getElementById('infoTags').innerHTML = tags;
  document.getElementById('infoDesc').textContent = info.desc;
  document.getElementById('infoWhy').textContent = info.why;
  document.getElementById('infoPanel').classList.add('visible');
}

function hideInfo() {
  document.getElementById('infoPanel').classList.remove('visible');
}

function highlightPhase(phase) {
  resetHighlights();
  if (phase === 'all') {
    document.querySelectorAll('.node').forEach(n => n.style.opacity = '1');
    document.querySelectorAll('.edge').forEach(e => { e.style.opacity = '0.4'; e.classList.remove('flowing'); });
    return;
  }

  document.querySelectorAll('.node').forEach(n => {
    const nodePhase = n.dataset.phase;
    if (nodePhase === phase || nodePhase === 'all') {
      n.style.opacity = '1';
    } else {
      n.style.opacity = '0.2';
    }
  });

  document.querySelectorAll('.edge').forEach(e => {
    const edgePhase = e.dataset.phase || '';
    if (edgePhase.includes(phase)) {
      e.classList.add('flowing');
      e.style.opacity = '0.8';
    } else {
      e.style.opacity = '0.1';
      e.classList.remove('flowing');
    }
  });
}

function highlightPhaseEdges(phase) {
  document.querySelectorAll('.edge').forEach(e => {
    const edgePhase = e.dataset.phase || '';
    if (phase === 'all' || edgePhase.includes(phase)) {
      e.classList.add('flowing');
    } else {
      e.classList.remove('flowing');
    }
  });
}

function resetHighlights() {
  document.querySelectorAll('.node').forEach(n => {
    n.classList.remove('highlighted');
    n.classList.remove('dimmed');
    n.style.opacity = '1';
  });
  document.querySelectorAll('.edge').forEach(e => {
    e.classList.remove('flowing');
    e.style.opacity = '0.4';
  });
}


// BGM volume cycle
const bgmLevels = [
  { label: 'Off', vol: 0 },
  { label: 'Low', vol: 0.1 },
  { label: 'Med', vol: 0.2 },
  { label: 'High', vol: 0.4 },
];
let bgmLevelIndex = 2; // Start at Medium (20%)

function toggleBGMVolume() {
  bgmLevelIndex = (bgmLevelIndex + 1) % bgmLevels.length;
  const level = bgmLevels[bgmLevelIndex];
  bgm.setVolume(level.vol);
  document.getElementById('bgmBtn').innerHTML = `&#9835; BGM: ${level.label}`;
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); toggleNarration(); }
  if (e.code === 'Escape') { hideInfo(); stopNarration(); }
  if (e.code === 'KeyM') { toggleBGMVolume(); }
});
</script>
