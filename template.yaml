        - DynamoDBReadPolicy:
            TableName: !Ref CasesTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

# =============================================================================
# Lambda Functions — Event Processors
# =============================================================================

  BehavioralProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "tg-behavioral-processor-${Environment}"
      CodeUri: lambdas/
      Handler: processors.behavioral_processor.lambda_handler
      Timeout: 60
      MemorySize: 512
      VpcConfig: !If
        - EnableRedis
        - SecurityGroupIds: [!Ref LambdaSecurityGroup]
          SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
        - !Ref "AWS::NoValue"
      Policies:
        - !Ref SafetyAgentBasePolicy
        - DynamoDBCrudPolicy:
            TableName: !Ref AnomalyScoresTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CasesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable
        - DynamoDBReadPolicy:
            TableName: !Ref ConfigTable
        - KinesisStreamReadPolicy:
            StreamName: !Ref BehavioralEventsStream
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt InvestigationStateMachine.Name
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt OperationsAlertTopic.TopicName
      Events:
        BehavioralStream:
          Type: Kinesis
          Properties:
            Stream: !GetAtt BehavioralEventsStream.Arn
            StartingPosition: LATEST
            BatchSize: 100
            MaximumBatchingWindowInSeconds: 5
            BisectBatchOnFunctionError: true
            MaximumRetryAttempts: 3

  ProfileProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "tg-profile-processor-${Environment}"
      CodeUri: lambdas/
      Handler: processors.profile_processor.lambda_handler
      Timeout: 15
      VpcConfig: !If
        - EnableRedis
        - SecurityGroupIds: [!Ref LambdaSecurityGroup]
          SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
        - !Ref "AWS::NoValue"
      Environment:
        Variables:
          PLATFORM_USER_API_URL: !Ref PlatformUserApiUrl
      Policies:
        - !Ref SafetyAgentBasePolicy
        - DynamoDBReadPolicy:
            TableName: !Ref BlocklistTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CasesTable

  BulkDetectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "tg-bulk-detector-${Environment}"
      CodeUri: lambdas/
      Handler: processors.bulk_detector.lambda_handler
      Timeout: 60
      MemorySize: 512
      VpcConfig: !If
        - EnableRedis
        - SecurityGroupIds: [!Ref LambdaSecurityGroup]
          SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
        - !Ref "AWS::NoValue"
      Policies:
        - !Ref SafetyAgentBasePolicy
        - DynamoDBReadPolicy:
            TableName: !Ref MetricsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CasesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt BulkActionStateMachine.Name
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt OperationsAlertTopic.TopicName

  NotificationProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "tg-notification-processor-${Environment}"
      CodeUri: lambdas/
      Handler: processors.notification_processor.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          PLATFORM_USER_API_URL: !Ref PlatformUserApiUrl
      Policies:
        - !Ref SafetyAgentBasePolicy
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable
        - DynamoDBReadPolicy:
            TableName: !Ref ConfigTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        NotificationQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt NotificationQueue.Arn
            BatchSize: 10

# =============================================================================
# Lambda Functions — Step Function Tasks
