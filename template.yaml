      Timeout: 10
      Policies:
        - !Ref SafetyAgentBasePolicy
        - DynamoDBCrudPolicy:
            TableName: !Ref AppealsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CasesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewQueueTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt NotificationQueue.QueueName
      Events:
        SubmitAppeal:
          Type: Api
          Properties:
            RestApiId: !Ref SafetyAgentApi
            Path: /api/v1/appeals
            Method: POST

  CrisisHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "tg-crisis-handler-${Environment}"
      CodeUri: lambdas/
      Handler: handlers.crisis_handler.lambda_handler
      Timeout: 15
      Policies:
        - !Ref SafetyAgentBasePolicy
        - DynamoDBCrudPolicy:
            TableName: !Ref CasesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewQueueTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable
        - DynamoDBReadPolicy:
            TableName: !Ref ConfigTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt NotificationQueue.QueueName
      Events:
        SendCrisisResources:
          Type: Api
          Properties:
            RestApiId: !Ref SafetyAgentApi
            Path: /api/v1/crisis/resources
            Method: POST

  AuditHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "tg-audit-handler-${Environment}"
      CodeUri: lambdas/
      Handler: handlers.audit_handler.lambda_handler
      Timeout: 30
      Policies:
        - !Ref SafetyAgentBasePolicy
        - DynamoDBReadPolicy:
            TableName: !Ref AuditLogsTable
        - DynamoDBReadPolicy:
            TableName: !Ref MetricsTable
        - DynamoDBReadPolicy:
            TableName: !Ref CasesTable
        - S3CrudPolicy:
            BucketName: !Ref AuditArchiveBucket
      Events:
        ExportAudit:
          Type: Api
          Properties:
            RestApiId: !Ref SafetyAgentApi
            Path: /api/v1/audit/export
            Method: GET
        ComplianceReport:
          Type: Api
          Properties:
            RestApiId: !Ref SafetyAgentApi
            Path: /api/v1/reports/compliance
            Method: GET

  ReviewerHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "tg-reviewer-handler-${Environment}"
      CodeUri: lambdas/
      Handler: handlers.reviewer_handler.lambda_handler
      Timeout: 10
      Policies:
        - !Ref SafetyAgentBasePolicy
        - DynamoDBReadPolicy:
            TableName: !Ref ReviewerStateTable
      Events:
        ExposureMetrics:
          Type: Api
          Properties:
            RestApiId: !Ref SafetyAgentApi
            Path: /api/v1/reviewers/{reviewerId}/exposure-metrics
