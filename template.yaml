            Auth:
              Authorizer: NONE
        PrometheusMetrics:
          Type: Api
          Properties:
            RestApiId: !Ref SafetyAgentApi
            Path: /api/v1/metrics
            Method: GET
            Auth:
              Authorizer: NONE
        RecentActions:
          Type: Api
          Properties:
            RestApiId: !Ref SafetyAgentApi
            Path: /api/v1/actions/recent
            Method: GET

  AuthHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "tg-auth-handler-${Environment}"
