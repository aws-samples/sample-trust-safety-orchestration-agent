      Timeout: 10
      Policies:
        - !Ref SafetyAgentBasePolicy
        - DynamoDBCrudPolicy:
            TableName: !Ref ConfigTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable
        - S3CrudPolicy:
            BucketName: !Ref ConfigBackupsBucket
      Events:
        UpdateThresholds:
          Type: Api
          Properties:
            RestApiId: !Ref SafetyAgentApi
            Path: /api/v1/config/thresholds
