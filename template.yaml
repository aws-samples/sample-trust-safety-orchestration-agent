        GetConfig:
          Type: Api
          Properties:
            RestApiId: !Ref SafetyAgentApi
            Path: /api/v1/config/current
            Method: GET
        RollbackConfig:
          Type: Api
          Properties:
            RestApiId: !Ref SafetyAgentApi
