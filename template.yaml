      Policies:
        - !Ref SafetyAgentBasePolicy
        - DynamoDBReadPolicy:
            TableName: !Ref MetricsTable
        - DynamoDBReadPolicy:
            TableName: !Ref CasesTable
        - DynamoDBReadPolicy:
            TableName: !Ref ReviewQueueTable
      Events:
        RealtimeMetrics:
          Type: Api
