  WebSocketHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "tg-websocket-handler-${Environment}"
      CodeUri: lambdas/
      Handler: handlers.websocket_handler.lambda_handler
      Timeout: 10
      VpcConfig: !If
        - EnableRedis
        - SecurityGroupIds: [!Ref LambdaSecurityGroup]
          SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
        - !Ref "AWS::NoValue"
      Policies:
