        - DynamoDBCrudPolicy:
            TableName: !Ref BlocklistTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AppealsTable
        - SQSSendMessagePolicy:
