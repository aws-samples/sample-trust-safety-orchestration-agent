      Policies:
        - !Ref SafetyAgentBasePolicy
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewQueueTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CasesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable
        - S3ReadPolicy:
            BucketName: !Ref EvidenceStoreBucket
        - SQSSendMessagePolicy:
            QueueName: !GetAtt NotificationQueue.QueueName
      Events:
        GetReviewQueue:
          Type: Api
          Properties:
            RestApiId: !Ref SafetyAgentApi
            Path: /api/v1/review-queue
