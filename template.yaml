        - !Ref SafetyAgentBasePolicy
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewQueueTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CasesTable
        - DynamoDBReadPolicy:
            TableName: !Ref ConfigTable

# =============================================================================
# CloudWatch Alarms
# =============================================================================

  HighErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "tg-high-error-rate-${Environment}"
      AlarmDescription: Error rate exceeds 5% across SafetyAgent functions
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref BehavioralProcessorFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref CriticalAlertTopic

  InvestigationDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "tg-investigation-duration-${Environment}"
      AlarmDescription: Investigation workflow exceeding 15 minute SLA
      Namespace: AWS/States
      MetricName: ExecutionTime
      Dimensions:
        - Name: StateMachineArn
          Value: !Ref InvestigationStateMachine
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 900000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OperationsAlertTopic

  ReviewQueueDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "tg-review-queue-depth-${Environment}"
      AlarmDescription: Review queue depth exceeds 1000
      Namespace: SafetyAgent
      MetricName: ReviewQueueDepth
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OperationsAlertTopic

  EnforcementQueueDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "tg-enforcement-queue-depth-${Environment}"
      AlarmDescription: Enforcement queue exceeds 1000 pending actions
      Namespace: SafetyAgent
      MetricName: EnforcementQueueDepth
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OperationsAlertTopic

# =============================================================================
# Outputs
# =============================================================================

Outputs:
  RestApiUrl:
    Description: SafetyAgent REST API URL
    Value: !Sub "https://${SafetyAgentApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"

  WebSocketUrl:
    Description: SafetyAgent WebSocket URL
    Value: !Sub "wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"

  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool

  CognitoClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref CognitoUserPoolClient

  InvestigationStateMachineArn:
    Description: Investigation workflow state machine ARN
    Value: !Ref InvestigationStateMachine

  BulkActionStateMachineArn:
    Description: Bulk action workflow state machine ARN
    Value: !Ref BulkActionStateMachine

  EvidenceBucketName:
    Description: Evidence store S3 bucket
    Value: !Ref EvidenceStoreBucket

  AuditBucketName:
    Description: Audit archive S3 bucket
    Value: !Ref AuditArchiveBucket

  CloudFrontDomainName:
    Description: CloudFront distribution domain name
    Value: !GetAtt CloudFrontDistribution.DomainName

  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution

  FrontendBucketName:
    Description: Frontend hosting S3 bucket
    Value: !Ref FrontendBucket
