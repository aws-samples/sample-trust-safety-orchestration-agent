            RestApiId: !Ref SafetyAgentApi
            Path: /api/v1/intelligence/ingest
            Method: POST
        PublishIntelligence:
          Type: Api
          Properties:
            RestApiId: !Ref SafetyAgentApi
            Path: /api/v1/intelligence/publish
            Method: POST

  MetricsHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "tg-metrics-handler-${Environment}"
      CodeUri: lambdas/
      Handler: handlers.metrics_handler.lambda_handler
      Timeout: 10
      VpcConfig: !If
        - EnableRedis
        - SecurityGroupIds: [!Ref LambdaSecurityGroup]
